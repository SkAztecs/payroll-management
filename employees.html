<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management - PayrollMS</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">PayrollMS</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="employees.html" class="active">Employees</a></li>
            <li><a href="attendance.html">Attendance</a></li>
            <li><a href="payroll.html">Payroll</a></li>
            <li><a href="reports.html">Reports</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="page-header">
            <h1>Employee Management</h1>
            <button class="btn-primary" onclick="showAddEmployeeModal()">+ Add Employee</button>
        </section>

        <section class="search-section">
            <input type="text" id="search-input" placeholder="Search by name or ID..." onkeyup="searchEmployee()">
        </section>

        <section class="table-section">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Position</th>
                        <th>Base Salary</th>
                        <th>Join Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employee-table-body">
                </tbody>
            </table>
        </section>
    </main>

    <!-- Add/Edit Employee Modal -->
    <div id="employee-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Add Employee</h2>
            <form id="employee-form" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="emp-id">
                <div class="form-group">
                    <label for="emp-name">Full Name</label>
                    <input type="text" id="emp-name" required>
                </div>
                <div class="form-group">
                    <label for="emp-dept">Department</label>
                    <select id="emp-dept" required>
                        <option value="">Select Department</option>
                        <option value="IT">IT</option>
                        <option value="HR">HR</option>
                        <option value="Finance">Finance</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="emp-position">Position</label>
                    <input type="text" id="emp-position" required>
                </div>
                <div class="form-group">
                    <label for="emp-salary">Base Salary (₹)</label>
                    <input type="number" id="emp-salary" required min="0">
                </div>
                <div class="form-group">
                    <label for="emp-join-date">Join Date</label>
                    <input type="date" id="emp-join-date" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Employee</button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Payroll Management System</p>
    </footer>

    <script src="scripts/main.js"></script>
    <script src="scripts/employees.js"></script>
</body>
</html>
